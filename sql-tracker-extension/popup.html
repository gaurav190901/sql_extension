<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 300px;
      padding: 16px;
      background: #0d1117;
      color: #e6edf3;
    }
    h1 { font-size: 15px; margin-bottom: 12px; color: #58a6ff; }
    .status { font-size: 13px; margin-bottom: 10px; color: #8b949e; }
    .status span.ok { color: #3fb950; font-weight: 600; }
    .status span.error { color: #f85149; }

    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      margin-top: 8px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #btn-auth { background: #238636; color: #fff; }
    #btn-logout { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }

    #auth-steps {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 12px;
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.6;
      display: none;
    }
    #auth-steps a { color: #58a6ff; }
    #user-code {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 3px;
      color: #f0f6fc;
      margin: 8px 0;
      text-align: center;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8b949e;
      margin: 14px 0 6px;
    }

    .platforms {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 4px;
    }
    .platform-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 10px;
      background: #161b22;
      border: 1px solid #30363d;
      color: #8b949e;
    }

    #history-list {
      max-height: 160px;
      overflow-y: auto;
      margin-top: 4px;
    }
    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid #21262d;
      font-size: 11px;
      gap: 6px;
    }
    .history-item:last-child { border-bottom: none; }
    .history-name {
      color: #e6edf3;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .history-platform {
      color: #58a6ff;
      font-size: 10px;
      flex-shrink: 0;
    }
    .history-date {
      color: #8b949e;
      font-size: 10px;
      flex-shrink: 0;
    }
    .empty-history { font-size: 12px; color: #8b949e; padding: 6px 0; }

    #history-list::-webkit-scrollbar { width: 4px; }
    #history-list::-webkit-scrollbar-track { background: transparent; }
    #history-list::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }
  </style>
</head>
<body>
  <h1>🗄 SQL Practice Tracker</h1>
  <div class="status" id="status">Checking...</div>

  <div id="auth-steps">
    <p>1. Go to <a id="verify-link" href="#" target="_blank">github.com/login/device</a></p>
    <p>2. Enter this code:</p>
    <div id="user-code"></div>
    <p>3. Authorize on your phone or browser</p>
    <p style="color:#8b949e; margin-top:8px;">Waiting for authorization...</p>
  </div>

  <button id="btn-auth">Connect GitHub</button>
  <button id="btn-logout" style="display:none">Disconnect</button>

  <div id="connected-section" style="display:none">
    <div class="section-title">Active Platforms</div>
    <div class="platforms">
      <span class="platform-badge">LeetCode</span>
      <span class="platform-badge">HackerRank</span>
      <span class="platform-badge">SQLZoo</span>
      <span class="platform-badge">sql-practice</span>
      <span class="platform-badge">SQLFiddle</span>
      <span class="platform-badge">DB Fiddle</span>
      <span class="platform-badge">StrataScratch</span>
    </div>

    <div class="section-title">Recent Saves</div>
    <div id="history-list">
      <div class="empty-history">No saves yet.</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
